<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kanalli – Banco 24h</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>

  <!-- ══════════════════════════════════════
       TELA 1 – SELEÇÃO DE BANCO
  ══════════════════════════════════════ -->
  <div id="screen-select" class="screen active">
    <div class="select-header">
      <div class="kanalli-brand">
        <img src="logos/Design sem nome (3).png" alt="" class="brand-logo-placeholder">
        <span class="brand-name">Kanalli</span>
      </div>
      <p class="select-subtitle">Terminal de Autoatendimento</p>
    </div>

    <p class="select-label">Selecione seu banco para continuar</p>

    <div class="bank-grid" id="bankGrid">
      <!-- Cards gerados pelo JS -->
    </div>

    <footer class="select-footer">
      <span>Kanalli Tecnologia Financeira &copy; 2025</span>
    </footer>
  </div>


  <!-- ══════════════════════════════════════
       TELA 2 – LOGIN (ESTILO ATM)
  ══════════════════════════════════════ -->
  <div id="screen-login" class="screen">

    <!-- ETAPA 1: Número do Cartão -->
    <div class="atm-step-wrapper" id="step-card">
      <div class="atm-card">

        <button class="btn-back" id="btnBackToSelect">&#8592; Trocar banco</button>

        <!-- Cabeçalho banco -->
        <div class="atm-bank-header">
          <div class="bank-logo-slot" id="bankLogoSlot"></div>
          <span class="bank-name-label" id="bankNameLabel"></span>
        </div>

        <!-- Indicador de etapa -->
        <div class="atm-step-indicator">
          <div class="step-item active">
            <div class="step-circle">1</div>
            <span>Cartão</span>
          </div>
          <div class="step-connector"></div>
          <div class="step-item">
            <div class="step-circle">2</div>
            <span>Senha</span>
          </div>
        </div>

        <div class="atm-instruction">
          <i class="fa-regular fa-credit-card"></i>
          <span>Digite o número do seu cartão</span>
        </div>

        <div class="field-group">
          <label>Número do Cartão</label>
          <input type="text" id="loginUser"
                 placeholder="0000 0000 0000 0000"
                 maxlength="19"
                 autocomplete="off"
                 class="card-input"/>
        </div>

        <p class="login-error" id="loginError"></p>
        <button class="btn-primary" id="btnNextStep">Continuar &nbsp;&#8594;</button>

        <p class="login-hint">Dados de demonstração abaixo</p>
        <p class="login-demo-info" id="loginDemoInfo"></p>
      </div>
    </div>

    <!-- ETAPA 2: PIN com teclado numérico -->
    <div class="atm-step-wrapper" id="step-pin" style="display:none">
      <div class="atm-card">

        <button class="btn-back" id="btnBackToCard">&#8592; Voltar</button>

        <!-- Cabeçalho banco (duplicado para etapa 2) -->
        <div class="atm-bank-header">
          <div class="bank-logo-slot" id="bankLogoSlot2"></div>
          <span class="bank-name-label" id="bankNameLabel2"></span>
        </div>

        <!-- Indicador de etapa -->
        <div class="atm-step-indicator">
          <div class="step-item done">
            <div class="step-circle"><i class="fa-solid fa-check"></i></div>
            <span>Cartão</span>
          </div>
          <div class="step-connector active"></div>
          <div class="step-item active">
            <div class="step-circle">2</div>
            <span>Senha</span>
          </div>
        </div>

        <div class="atm-instruction">
          <i class="fa-solid fa-lock"></i>
          <span>Digite sua senha</span>
        </div>

        <!-- Display de pontos do PIN -->
        <div class="pin-display" id="pinDisplay">
          <span class="pin-dot" id="pinDot0"></span>
          <span class="pin-dot" id="pinDot1"></span>
          <span class="pin-dot" id="pinDot2"></span>
          <span class="pin-dot" id="pinDot3"></span>
        </div>

        <!-- Input escondido para guardar o PIN -->
        <input type="hidden" id="loginPass" />

        <!-- Teclado numérico -->
        <div class="pin-pad" id="pinPad">
          <button class="pin-key" data-val="1">1</button>
          <button class="pin-key" data-val="2">2</button>
          <button class="pin-key" data-val="3">3</button>
          <button class="pin-key" data-val="4">4</button>
          <button class="pin-key" data-val="5">5</button>
          <button class="pin-key" data-val="6">6</button>
          <button class="pin-key" data-val="7">7</button>
          <button class="pin-key" data-val="8">8</button>
          <button class="pin-key" data-val="9">9</button>
          <button class="pin-key pin-key--del" id="pinDel"><i class="fa-solid fa-delete-left"></i></button>
          <button class="pin-key" data-val="0">0</button>
          <button class="pin-key pin-key--ok" id="pinOk"><i class="fa-solid fa-check"></i></button>
        </div>

        <p class="login-error" id="pinError"></p>
      </div>
    </div>

  </div>


  <!-- ══════════════════════════════════════
       TELA 3 – MENU / PAINEL PRINCIPAL
  ══════════════════════════════════════ -->
  <div id="screen-menu" class="screen">

    <!-- Barra superior — logo do banco + nome, SEM logo Kanalli -->
    <header class="dashboard-header" id="dashboardHeader">
      <div class="dh-brand" id="dhBrandSlot">
        <!-- Logo do banco injetada pelo JS -->
      </div>
      <div class="dh-bank" id="dhBankName"></div>
      <button class="btn-logout" id="btnLogout">Sair &#x2192;</button>
    </header>

    <main class="dashboard-body">

      <!-- Cartão de saldo -->
      <section class="balance-card" id="balanceCard">
        <p class="bc-label">Saldo disponível</p>
        <h1 class="bc-amount" id="bcAmount">R$ 0,00</h1>
        <p class="bc-user" id="bcUser"></p>
      </section>

      <!-- Grade de operações -->
      <section class="ops-grid">
        <button class="op-btn" data-op="saque">
          <span class="op-icon"><i class="fa-brands fa-cash-app"></i></span>
          <span>Saque</span>
        </button>
        <button class="op-btn" data-op="deposito">
          <span class="op-icon"><i class="fa-solid fa-hand-holding-dollar"></i></span>
          <span>Depósito</span>
        </button>
        <button class="op-btn" data-op="transferencia">
          <span class="op-icon"><i class="fa-solid fa-money-bill-transfer"></i></span>
          <span>Transferência</span>
        </button>
        <button class="op-btn" data-op="senha">
          <span class="op-icon"><i class="fa-solid fa-lock"></i></span>
          <span>Trocar Senha</span>
        </button>
        <button class="op-btn" data-op="extrato">
          <span class="op-icon"><i class="fa-solid fa-scroll"></i></span>
          <span>Extrato</span>
        </button>
        <button class="op-btn" data-op="pdf">
          <span class="op-icon"><i class="fa-solid fa-file-pdf"></i></span>
          <span>Gerar PDF</span>
        </button>
      </section>

      <!-- Extrato inline -->
      <section class="statement-section" id="statementSection" style="display:none">
        <h3 class="statement-title">Extrato de Transações</h3>
        <ul class="statement-list" id="statementList"></ul>
      </section>

    </main>
  </div>


  <!-- ══════════════════════════════════════
       MODAL GENÉRICO
  ══════════════════════════════════════ -->
  <div id="modal" class="modal-overlay" style="display:none">
    <div class="modal-box" id="modalBox">
      <h3 id="modalTitle"></h3>
      <p  id="modalBody"></p>
      <div class="modal-input-wrap" id="modalInputWrap" style="display:none">
        <input type="text" id="modalInput" placeholder="0,00"/>
        <p class="modal-error" id="modalError"></p>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" id="modalCancel">Cancelar</button>
        <button class="btn-primary"   id="modalConfirm">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- Modal troca de senha -->
  <div id="modalPass" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <h3>Trocar Senha</h3>
      <div class="field-group">
        <label>Senha atual</label>
        <input type="password" id="passOld" placeholder="••••••••"/>
      </div>
      <div class="field-group">
        <label>Nova senha</label>
        <input type="password" id="passNew" placeholder="••••••••"/>
      </div>
      <div class="field-group">
        <label>Confirmar nova senha</label>
        <input type="password" id="passConfirm" placeholder="••••••••"/>
      </div>
      <p class="modal-error" id="passError"></p>
      <div class="modal-actions">
        <button class="btn-secondary" id="passCancel">Cancelar</button>
        <button class="btn-primary"   id="passSave">Salvar</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
